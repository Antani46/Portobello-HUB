# =============================================================================
# Portobello Hub - Application Configuration
# Tutte le credenziali sensibili sono lette da variabili d'ambiente.
# =============================================================================

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Database (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portobello_hub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- JWT ---
jwt.secret=${JWT_SECRET:change-me-to-a-very-long-and-secure-secret-key-at-least-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Cloudinary ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- ExchangeRate-API ---
exchange-rate.base-url=${EXCHANGE_RATE_BASE_URL:https://api.exchangerate-api.com/v4/latest/}
exchange-rate.api-key=${EXCHANGE_RATE_API_KEY:}
app.base-currency=${APP_BASE_CURRENCY:EUR}

# --- File Upload (avatar e immagini articoli) ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# --- GraphQL ---
spring.graphql.graphiql.enabled=${GRAPHQL_GRAPHIQL_ENABLED:true}
spring.graphql.path=/graphql
spring.graphql.schema.locations=classpath:graphql/

# --- Seed admin (solo sviluppo) ---
app.seed-admin-email=${SEED_ADMIN_EMAIL:admin@portobellohub.com}
app.seed-admin-password=${SEED_ADMIN_PASSWORD:Admin123!}

# --- Logging ---
logging.level.com.university.portobellohub=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
